<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-6">
    <h1 class="text-xl font-bold mb-4">Product Inventory</h1>
    <form id="form">
      <div class="mb-3">
        <label>Product Name</label>
        <input
          type="text"
          id="name"
          class="border p-2 w-full mb-2"
          placeholder="Enter Product Name"
        />
      </div>

      <div class="mb-3">
        <label>Select Category</label>
        <select id="category" class="border p-2 w-full mb-2">
          <option value="Food">Food</option>
          <option value="Clothing">Clothing</option>
          <option value="Consumable">Consumable</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Quantity</label>
        <input
          type="number"
          id="quantity"
          placeholder="Enter Product Quantity"
          class="border p-2 w-full mb-2"
        />
      </div>

      <button class="bg-blue-500 text-white px-4 py-2 w-full" type="submit">
        Submit
      </button>
    </form>

    <div class="max-w-4xl mx-auto mt-6">
      <button
        onclick="loadUsers()"
        class="bg-green-500 text-white px-4 py-2 mb-3"
      >
        Load Users
      </button>

      <table class="w-full border bg-white">
        <thead>
          <tr class="bg-gray-200">
            <th class="border p-2">Product Name</th>
            <th class="border p-2">Category</th>
            <th class="border p-2">Quantity</th>
            <th class="border p-2">Action</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
